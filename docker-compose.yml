version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: arvyax-journal-backend
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: file:./dev.db
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      CACHE_TTL_SECONDS: 3600
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
    ports:
      - "3001:3001"
    volumes:
      - backend_data:/app/prisma

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: arvyax-journal-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  backend_data:
